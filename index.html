<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>منصّة التدريب — جاري التحويل...</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a4d3e; color: #fff; text-align: center; }
    .box { max-width: 400px; }
    h2 { margin-bottom: 10px; }
    p { color: #a0d4c0; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #7fdbba; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>منصّة التدريب</h2>
    <p>جاري التحويل للمنصة...</p>
    <p id="fallback" style="display:none">إذا لم يتم التحويل تلقائياً: <a id="link" href="#">انقر هنا</a></p>
  </div>
  <script>
    fetch('tunnel-url.txt?t=' + Date.now())
      .then(r => r.text())
      .then(url => {
        url = url.trim();
        if (url && url.startsWith('http')) {
          window.location.href = url;
        } else {
          document.getElementById('fallback').style.display = 'block';
          document.querySelector('p:nth-child(3)').textContent = 'المنصة غير متاحة حالياً — تأكد أن الجهاز شغّال';
        }
      })
      .catch(() => {
        document.getElementById('fallback').style.display = 'block';
        document.querySelector('p:nth-child(3)').textContent = 'المنصة غير متاحة حالياً';
      });
  </script>
</body>
</html>
